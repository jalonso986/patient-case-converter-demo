<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Plan de tratamiento de Carla</title>

  <meta property="og:title" content="Carla, tu sonrisa empieza aquí" />
  <meta property="og:description" content="Tu plan de tratamiento personalizado, explicado paso a paso." />
  <meta property="og:image" content="https://jalonso986.github.io/patient-case-converter-demo/patient-case-converter-demo/01%20-%20Preview%20Virtual%20Card%20Whatsapp.png" />
  <meta property="og:type" content="website" />

  <style>
    html, body {
      margin: 0;
      background: #f4f4f4;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      overscroll-behavior: none;
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: white;
      position: relative;
      overflow-x: hidden;
    }

    .screen { display: none; position: relative; }
    .screen.active { display: block; }

    .screen-img, .home-img {
      width: 100%;
      display: block;
    }

    .hotspot {
      position: absolute;
      cursor: pointer;
      background: rgba(255,255,255,0);
      z-index: 20;
    }

    .back {
      position: fixed;
      top: 10px;
      left: calc(50% - 205px);
      z-index: 90;
      background: rgba(255,255,255,0.95);
      border: 1px solid #ddd;
      border-radius: 18px;
      padding: 7px 12px;
      font-size: 14px;
      cursor: pointer;
    }

    @media (max-width: 430px) {
      .back { left: 10px; }
    }

    /* HOME recortada para evitar blanco sobrante */
    .home-frame {
      position: relative;
      width: 100%;
      height: 1010px;
      overflow: hidden;
      background: white;
    }

    .home-frame img {
      width: 100%;
      display: block;
    }

    /* DESGLOSE: header fijo + lista scrollable */
    .breakdown-fixed {
      position: sticky;
      top: 0;
      z-index: 30;
      background: white;
      height: 392px;
      overflow: hidden;
      border-bottom: 1px solid #ddd;
    }

    .breakdown-fixed img {
      width: 100%;
      display: block;
    }

    .breakdown-scroll {
      position: relative;
      height: calc(100vh - 392px);
      overflow-y: auto;
      overflow-x: hidden;
      background: white;
    }

    .breakdown-scroll-inner {
      position: relative;
      height: 1410px;
      overflow: hidden;
    }

    .breakdown-scroll-inner img {
      width: 100%;
      display: block;
      transform: translateY(-392px);
    }

    /* DETALLE FULL SCREEN + ZOOM */
    .detail-view {
      display: none;
      position: fixed;
      inset: 0;
      background: white;
      z-index: 70;
      overflow: auto;
      touch-action: pan-x pan-y pinch-zoom;
    }

    .detail-view.active { display: block; }

    .detail-img {
      width: 100%;
      max-width: none;
      display: block;
      margin-top: 48px;
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- HOME -->
    <section id="home" class="screen active">
      <div class="home-frame">
        <img class="home-img" src="02 - Vista inicial.png" />

        <!-- Resolver dudas por WhatsApp -->
        <a class="hotspot"
           style="left:50%; top:13.5%; width:47%; height:6.5%;"
           href="https://wa.me/"
           target="_blank"></a>

        <!-- Ver plan paso a paso -->
        <div class="hotspot"
             style="left:50%; top:21.5%; width:47%; height:6.5%;"
             onclick="showScreen('timeline')"></div>

        <!-- Ver coste desglosado -->
        <div class="hotspot"
             style="left:50%; top:29.5%; width:47%; height:6.5%;"
             onclick="showScreen('breakdown')"></div>

        <!-- Click en bloque desglose -->
        <div class="hotspot"
             style="left:0%; top:57%; width:100%; height:20%;"
             onclick="showScreen('breakdown')"></div>

        <!-- Ver desglose completo -->
        <div class="hotspot"
             style="left:55%; top:60%; width:42%; height:6%;"
             onclick="showScreen('breakdown')"></div>

        <!-- Click en timeline -->
        <div class="hotspot"
             style="left:0%; top:78%; width:100%; height:20%;"
             onclick="showScreen('timeline')"></div>

        <!-- Ver plan completo -->
        <div class="hotspot"
             style="left:55%; top:79%; width:42%; height:6%;"
             onclick="showScreen('timeline')"></div>
      </div>
    </section>

    <!-- DESGLOSE -->
    <section id="breakdown" class="screen">
      <button class="back" onclick="goBack()">← Volver</button>

      <div class="breakdown-fixed">
        <img src="03 - Plan desglose.png" />
      </div>

      <div class="breakdown-scroll">
        <div class="breakdown-scroll-inner">
          <img src="03 - Plan desglose.png" />

          <div class="hotspot" style="left:0%; top:0px; width:100%; height:78px;" onclick="openDetail('multidisciplinar.png')"></div>
          <div class="hotspot" style="left:0%; top:78px; width:100%; height:78px;" onclick="openDetail('gingivitis.png')"></div>
          <div class="hotspot" style="left:0%; top:156px; width:100%; height:78px;" onclick="openDetail('sarpe.png')"></div>
          <div class="hotspot" style="left:0%; top:234px; width:100%; height:78px;" onclick="openDetail('alineadores.png')"></div>
          <div class="hotspot" style="left:0%; top:312px; width:100%; height:78px;" onclick="openDetail('carillas.png')"></div>
          <div class="hotspot" style="left:0%; top:390px; width:100%; height:78px;" onclick="openDetail('carillas.png')"></div>
          <div class="hotspot" style="left:0%; top:468px; width:100%; height:78px;" onclick="openDetail('carillas.png')"></div>
          <div class="hotspot" style="left:0%; top:546px; width:100%; height:78px;" onclick="openDetail('carillas.png')"></div>
          <div class="hotspot" style="left:0%; top:624px; width:100%; height:78px;" onclick="openDetail('carillas.png')"></div>
          <div class="hotspot" style="left:0%; top:702px; width:100%; height:78px;" onclick="openDetail('carillas.png')"></div>
          <div class="hotspot" style="left:0%; top:780px; width:100%; height:78px;" onclick="openDetail('ferula.png')"></div>
          <div class="hotspot" style="left:0%; top:858px; width:100%; height:78px;" onclick="openDetail('essix.png')"></div>
          <div class="hotspot" style="left:0%; top:936px; width:100%; height:90px;" onclick="openDetail('retainer.png')"></div>
        </div>
      </div>
    </section>

    <!-- TIMELINE -->
    <section id="timeline" class="screen">
      <button class="back" onclick="goBack()">← Volver</button>
      <img class="screen-img" src="06 - Plan tratamiento.png" />
    </section>

  </div>

  <!-- DETALLE EXPANDIDO -->
  <div id="detail" class="detail-view">
    <button class="back" onclick="goBack()">← Volver</button>
    <img id="detail-img" class="detail-img" src="" />
  </div>

  <script>
    let currentScreen = "home";

    history.replaceState({ screen: "home" }, "");

    function showScreen(id, push = true) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
      closeDetail(false);
      currentScreen = id;
      window.scrollTo(0, 0);

      if (push) {
        history.pushState({ screen: id }, "");
      }
    }

    function openDetail(src, push = true) {
      document.getElementById("detail-img").src = src;
      document.getElementById("detail").classList.add("active");

      if (push) {
        history.pushState({ screen: currentScreen, detail: src }, "");
      }
    }

    function closeDetail(clear = true) {
      document.getElementById("detail").classList.remove("active");
      if (clear) document.getElementById("detail-img").src = "";
    }

    function goBack() {
      history.back();
    }

    window.addEventListener("popstate", function(event) {
      const state = event.state || { screen: "home" };

      if (state.detail) {
        showScreen(state.screen, false);
        openDetail(state.detail, false);
        return;
      }

      closeDetail();
      showScreen(state.screen || "home", false);
    });
  </script>
</body>
</html>
